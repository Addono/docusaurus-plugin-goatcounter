version: 2

updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "GitHub Actions"
      - "dependencies"

  # Maintain dependencies for yarn
  - package-ecosystem: "npm" # We need to specify npm, although we use yarn, see https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates#package-ecosystem
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    labels:
      - "yarn"
      - "dependencies"
    ignore:
      # Ignore non-LTS versions of Node types (odd-numbered major versions)
      # LTS versions are even-numbered: 18, 20, 22, 24, 26, etc.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
        versions: ["19.x", "21.x", "23.x", "25.x", "27.x", "29.x", "31.x"]
